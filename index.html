<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的文章</title>
<link rel="stylesheet" href="style.css">
<style>
  /* ============ 首页英雄区 ============ */
  .hero {
    text-align: center;
    padding: 100px 24px 80px;
    position: relative;
    z-index: 1;
  }
  .hero-deco {
    display: inline-block;
    width: 48px;
    height: 1px;
    background: var(--clay);
    margin-bottom: 28px;
    position: relative;
    animation: fadeIn 1s ease-out both;
  }
  .hero-deco::before {
    content: '✦';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--clay);
    background: var(--parchment);
    padding: 0 8px;
  }
  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 400;
    color: var(--ink);
    letter-spacing: 2px;
    margin-bottom: 16px;
    animation: fadeUp 0.8s ease-out 0.1s both;
  }
  .hero .tagline {
    font-size: 16px;
    color: var(--text-light);
    font-weight: 300;
    letter-spacing: 1px;
    animation: fadeUp 0.8s ease-out 0.25s both;
  }

  /* ============ 文章列表 ============ */
  .articles-section {
    max-width: 740px;
    margin: 0 auto;
    padding: 0 24px 80px;
    position: relative;
    z-index: 1;
  }
  .section-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--text-muted);
    margin-bottom: 32px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.7s ease-out 0.35s both;
  }

  .article-list {
    list-style: none;
  }
  .article-item {
    animation: fadeUp 0.7s ease-out both;
  }
  .article-item:nth-child(1) { animation-delay: 0.4s; }
  .article-item:nth-child(2) { animation-delay: 0.5s; }
  .article-item:nth-child(3) { animation-delay: 0.6s; }
  .article-item:nth-child(4) { animation-delay: 0.7s; }
  .article-item:nth-child(5) { animation-delay: 0.8s; }

  .article-link {
    display: block;
    text-decoration: none;
    color: inherit;
    padding: 28px 0;
    border-bottom: 1px solid var(--border);
    transition: all 0.35s ease;
    position: relative;
  }
  .article-link::before {
    content: '';
    position: absolute;
    left: -20px;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--terracotta);
    border-radius: 2px;
    opacity: 0;
    transform: scaleY(0.3);
    transition: all 0.35s ease;
  }
  .article-link:hover {
    padding-left: 12px;
  }
  .article-link:hover::before {
    opacity: 1;
    transform: scaleY(0.6);
    left: -8px;
  }

  .article-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .article-date {
    font-size: 13px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .article-tag {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 12px;
    background: var(--cream);
    color: var(--earth);
    border: 1px solid var(--sand);
  }
  .article-title {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
    transition: color 0.3s;
    line-height: 1.5;
  }
  .article-link:hover .article-title {
    color: var(--terracotta);
  }
  .article-desc {
    font-size: 14.5px;
    color: var(--text-light);
    line-height: 1.7;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .article-arrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--terracotta);
    opacity: 0;
    transform: translateX(-8px);
    transition: all 0.35s ease;
  }
  .article-link:hover .article-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  /* ============ 空状态 ============ */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

  /* ============ 响应式 ============ */
  @media (max-width: 640px) {
    .hero { padding: 72px 20px 56px; }
    .articles-section { padding: 0 20px 60px; }
    .article-link { padding: 22px 0; }
    .article-title { font-size: 19px; }
    .article-link::before { display: none; }
    .article-link:hover { padding-left: 0; }
    .article-arrow { opacity: 1; transform: none; }
  }
</style>
</head>
<body>

<!-- 导航 -->
<nav class="site-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">我的文章</a>
    <div class="nav-links">
      <a href="index.html">首页</a>
    </div>
  </div>
</nav>

<!-- 英雄区 -->
<section class="hero">
  <div class="hero-deco"></div>
  <h1>我的文章</h1>
  <p class="tagline">记录学习，沉淀思考</p>
</section>

<!-- 文章列表 -->
<section class="articles-section">
  <div class="section-label">所有文章</div>

  <ul class="article-list">

    <!-- ====== 在这里添加新文章 ====== -->

    <li class="article-item">

        <span class="article-arrow">阅读全文 →</span>
      </a>
    </li>

    ====== 模板结束 ====== -->

  </ul>
</section>

<!-- 页脚 -->
<footer class="site-footer">
  <div class="footer-divider"></div>
  <p class="footer-quote">学而不思则罔，思而不学则殆</p>
  <p>© 2025</p>
</footer>

</body>
</html>
